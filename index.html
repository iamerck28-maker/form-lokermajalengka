<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loker Majalengka - Form Pemasangan Iklan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-2 text-center">LOKER MAJALENGKA</h1>
        <p class="text-gray-600 mb-6 text-center">Form Pemasangan Iklan</p>

        <form action="https://formspree.io/f/sample" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Nama Klien / Bisnis</label>
                <input type="text" name="nama_klien" class="w-full p-2 border rounded mt-1" placeholder="Masukkan nama..." required>
            </div>
            
            <div>
                <label class="block text-sm font-medium">WhatsApp</label>
                <input type="tel" name="whatsapp" class="w-full p-2 border rounded mt-1" placeholder="0812..." required>
            </div>

            <div>
                <label class="block text-sm font-medium">Alamat Kantor</label>
                <textarea name="alamat" class="w-full p-2 border rounded mt-1"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Kirim Pendaftaran
            </button>
        </form>
    </div>
</body>
</html>
